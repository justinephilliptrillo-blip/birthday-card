<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🌙💙</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Patrick Hand', cursive;
    background: linear-gradient(135deg, #0b1e3d, #1b3c73);
    color: #e6f0ff;
    text-align: center;
    overflow-x: hidden;
}

/* Stars background */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.3;
    z-index: -1;
}

/* Title */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3em;
    color: #a8d0ff;
    text-shadow: 0 0 15px rgba(168,208,255,0.8);
}

/* Card */
.card {
    background: rgba(255,255,255,0.08);
    border-radius: 15px;
    padding: 20px;
    margin: 25px auto;
    width: 85%;
    backdrop-filter: blur(10px);
    position: relative;
}

/* Tape */
.card::before {
    content: "";
    width: 60px;
    height: 20px;
    background: rgba(255,255,255,0.3);
    position: absolute;
    top: -10px;
    left: 20px;
    transform: rotate(-8deg);
}

/* Section title */
h2 {
    color: #cfe7ff;
}

/* Message */
[contenteditable] {
    background: rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 10px;
}

/* Candle */
.candle {
    font-size: 60px;
    cursor: pointer;
    transition: 0.3s;
}
.candle:hover {
    transform: scale(1.2);
}

/* Buttons */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #4da3ff;
    color: white;
    cursor: pointer;
}

/* 🌙 Polaroid Style */
.polaroid {
    display: inline-block;
    background: white;
    padding: 10px 10px 25px 10px;
    margin: 10px;
    border-radius: 10px;
    transform: rotate(-2deg);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.polaroid:hover {
    transform: rotate(2deg) scale(1.05);
}

.polaroid img {
    width: 120px;
    border-radius: 5px;
}

.caption {
    color: #333;
    font-size: 14px;
    margin-top: 5px;
}

/* Guestbook */
#guestbook div {
    background: rgba(255,255,255,0.1);
    margin: 8px;
    padding: 8px;
    border-radius: 8px;
}

/* Hidden */
.hidden {
    display: none;
}
</style>
</head>

<body>

<h1>🌙 Happy Birthday 💙</h1>

<!-- Music -->
<audio autoplay loop>
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<div class="card">
    <h2>💌 A Note Under the Stars</h2>
    <p contenteditable="true">Write something magical tonight 💙</p>
</div>

<div class="card">
    <h2>🕯 Make a Wish</h2>
    <div class="candle" onclick="blowCandle()">🕯</div>
    <p id="surprise" class="hidden">✨ Surprise! You light up my universe 🌌💙</p>
</div>

<div class="card">
    <h2>⏳ Countdown</h2>
    <p id="countdown"></p>
</div>

<div class="card">
    <h2>📸 Polaroid Memories</h2>
    <input type="file" onchange="addImage(event)">
    <div id="gallery"></div>
</div>

<div class="card">
    <h2>📖 Wishes</h2>
    <input type="text" id="guestInput" placeholder="Leave a sweet message 💙">
    <button onclick="addGuest()">Add</button>
    <div id="guestbook"></div>
</div>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// 🎉 Night confetti
window.onload = function() {
    confetti({
        particleCount: 120,
        spread: 70,
        colors: ['#a8d0ff', '#4da3ff', '#ffffff']
    });
}

// Candle
function blowCandle() {
    document.querySelector(".candle").textContent = "💨";
    document.getElementById("surprise").classList.remove("hidden");

    confetti({
        particleCount: 150,
        spread: 100
    });
}

// Countdown
var targetDate = new Date("2026-04-01T00:00:00").getTime();
setInterval(function() {
    var now = new Date().getTime();
    var diff = targetDate - now;

    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    var hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

    document.getElementById("countdown").innerHTML =
        days + " days " + hours + " hours left 🎂";
}, 1000);

// 📸 Polaroid Gallery
function addImage(event) {
    var container = document.createElement("div");
    container.className = "polaroid";

    var img = document.createElement("img");
    img.src = URL.createObjectURL(event.target.files[0]);

    var caption = document.createElement("div");
    caption.className = "caption";
    caption.textContent = "💙 memory";

    container.appendChild(img);
    container.appendChild(caption);

    document.getElementById("gallery").appendChild(container);
}

// Guestbook + fireworks
let guestCount = 0;

function addGuest() {
    var input = document.getElementById("guestInput");

    if (input.value.trim() === "") return;

    var div = document.createElement("div");
    div.textContent = "💙 " + input.value;

    document.getElementById("guestbook").appendChild(div);

    input.value = "";
    guestCount++;

    if (guestCount === 10) {
        launchFireworks();
    }
}

// Fireworks
function launchFireworks() {
    let duration = 3 * 1000;
    let end = Date.now() + duration;

    (function frame() {
        confetti({
            particleCount: 12,
            angle: 60,
            spread: 60,
            origin: { x: 0 }
        });
        confetti({
            particleCount: 12,
            angle: 120,
            spread: 60,
            origin: { x: 1 }
        });

        if (Date.now() < end) {
            requestAnimationFrame(frame);
        }
    })();
}
</script>

</body>
</html>
